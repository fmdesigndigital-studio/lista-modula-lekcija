<head>
    <meta charset="UTF-8">

    <style>
        /* Modern & Minimalist Reset and Variables */
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-color: #0d6efd;
            --accent-hover: #0b5ed7;
            --success-color: #198754;
            --border-color: #dee2e6;
            --font-family: Arial, Helvetica, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--container-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding-bottom: 30px;
        }

        /* Header & Progress Bar */
        .header {
            padding: 40px 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .header h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 25px;
        }

        .progress-container {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--success-color);
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--success-color);
        }

        /* Checklist Content */
        .content {
            padding: 30px 40px;
        }

        .module {
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background-color: var(--container-bg);
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            background-color: #f8f9fa;
            transition: background-color 0.2s ease;
        }

        .module-header:hover {
            background-color: #e9ecef;
        }

        .module-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .module-toggle-icon {
            font-size: 14px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .module.open .module-toggle-icon {
            transform: rotate(180deg);
        }

        .module-content {
            display: none;
            padding: 15px 20px 20px;
            border-top: 1px solid var(--border-color);
        }

        .module.open .module-content {
            display: block;
        }

        .lesson-list {
            list-style: none;
        }

        .lesson-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 8px 10px;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .lesson-item:hover {
            background-color: #f1f3f5;
        }

        .lesson-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            margin-right: 15px;
            margin-top: 2px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .lesson-checkbox:checked {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .lesson-checkbox:checked::after {
            content: '✔';
            position: absolute;
            color: white;
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .lesson-label {
            cursor: pointer;
            font-size: 16px;
            color: #495057;
            user-select: none;
            transition: color 0.2s ease;
            line-height: 1.4;
        }

        .lesson-checkbox:checked + .lesson-label {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* Buttons & Footer */
        .actions {
            text-align: center;
            padding: 20px 40px 40px;
            border-top: 1px dashed var(--border-color);
            margin-top: 20px;
        }

        .btn-reset {
            background-color: transparent;
            color: var(--text-muted);
            border: 2px solid var(--border-color);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-family);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-reset:hover {
            background-color: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-bottom: 20px;
        }

        .footer p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .footer .highlight {
            font-weight: bold;
            color: var(--text-main);
        }

        @media (max-width: 600px) {
            .header, .content, .actions {
                padding-left: 20px;
                padding-right: 20px;
            }
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('checklistContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const resetBtn = document.getElementById('resetBtn');
            const STORAGE_KEY = 'masterbox_2026_progress';

            let totalLessons = 0;
            let checkedLessons = 0;

            // Učitavanje memorisanog stanja iz localStorage
            const savedState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

            // Renderovanje HTML strukture iz baze podataka
            courseData.forEach((mod, moduleIndex) => {
                // Kreiraj div za Modul
                const moduleDiv = document.createElement('div');
                moduleDiv.className = 'module';
                
                // --- HEADER (Klikabilni deo za otvaranje menija) ---
                const moduleHeader = document.createElement('div');
                moduleHeader.className = 'module-header';
                
                const moduleTitle = document.createElement('h2');
                moduleTitle.className = 'module-title';
                moduleTitle.textContent = mod.module;

                const toggleIcon = document.createElement('span');
                toggleIcon.className = 'module-toggle-icon';
                toggleIcon.innerHTML = '▼'; // Strelica

                moduleHeader.appendChild(moduleTitle);
                moduleHeader.appendChild(toggleIcon);
                moduleDiv.appendChild(moduleHeader);

                // --- CONTENT (Sakriveni deo sa lekcijama) ---
                const moduleContent = document.createElement('div');
                moduleContent.className = 'module-content';

                // Lista lekcija
                const lessonList = document.createElement('ul');
                lessonList.className = 'lesson-list';

                mod.lessons.forEach((lessonName, lessonIndex) => {
                    totalLessons++;
                    const lessonId = `lesson-${moduleIndex}-${lessonIndex}`;
                    const isChecked = savedState[lessonId] === true;

                    if (isChecked) {
                        checkedLessons++;
                    }

                    const li = document.createElement('li');
                    li.className = 'lesson-item';

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = lessonId;
                    checkbox.className = 'lesson-checkbox';
                    checkbox.checked = isChecked;

                    const label = document.createElement('label');
                    label.htmlFor = lessonId;
                    label.className = 'lesson-label';
                    label.textContent = lessonName;

                    // Event listener za ažuriranje stanja i progres bara
                    checkbox.addEventListener('change', (e) => {
                        const checked = e.target.checked;
                        
                        // Ažuriraj stanje u memoriji
                        savedState[lessonId] = checked;
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedState));

                        // Ažuriraj brojčanik
                        checkedLessons += checked ? 1 : -1;
                        updateProgress();
                    });

                    li.appendChild(checkbox);
                    li.appendChild(label);
                    lessonList.appendChild(li);
                });

                moduleContent.appendChild(lessonList);
                moduleDiv.appendChild(moduleContent);
                container.appendChild(moduleDiv);

                // --- LOGIKA ZA OTVARANJE/ZATVARANJE MODULA ---
                moduleHeader.addEventListener('click', () => {
                    moduleDiv.classList.toggle('open');
                });
            });

            // Funkcija za osvežavanje progres bara
            function updateProgress() {
                const percentage = totalLessons === 0 ? 0 : Math.round((checkedLessons / totalLessons) * 100);
                progressBar.style.width = `${percentage}%`;
                progressText.textContent = `${percentage}% (${checkedLessons}/${totalLessons})`;

                // Menjanje boje progres bara ako je 100%
                if(percentage === 100) {
                    progressBar.style.backgroundColor = '#0d6efd'; // Plava boja kad se završi sve
                    progressText.style.color = '#0d6efd';
                    progressText.textContent = `100% - ČESTITAMO! SVE JE ZAVRŠENO! (${checkedLessons}/${totalLessons})`;
                } else {
                    progressBar.style.backgroundColor = 'var(--success-color)';
                    progressText.style.color = 'var(--success-color)';
                }
            }

            // Prikaz početnog progresa pri učitavanju
            updateProgress();

            // Funkcionalnost za dugme Reset
            resetBtn.addEventListener('click', () => {
                const confirmReset = confirm("Da li ste sigurni da želite da resetujete sav napredak?\nOva akcija će obrisati sve vaše kvačice i vratiti progres na 0%.");
                
                if (confirmReset) {
                    // Očisti localStorage
                    localStorage.removeItem(STORAGE_KEY);
                    
                    // Očisti memorijski objekat
                    for (let key in savedState) {
                        delete savedState[key];
                    }

                    // Odčekiraj sve vizuelno
                    document.querySelectorAll('.lesson-checkbox').forEach(cb => {
                        cb.checked = false;
                    });

                    // Resetuj brojčanik
                    checkedLessons = 0;
                    updateProgress();
                }
            });
        });
